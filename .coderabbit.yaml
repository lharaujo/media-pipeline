# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
# CodeRabbit configuration for media-pipeline.
# Docs: https://docs.coderabbit.ai/getting-started/yaml-configuration

language: "en-US"
early_access: false

tone_instructions: >-
  Be direct, practical, and safety-focused. This repository manages personal media
  files and can move large numbers of files, so prioritize data-loss prevention,
  secure defaults, idempotency, clear recovery paths, and copy-pasteable fixes.

reviews:
  profile: "assertive"
  request_changes_workflow: false
  high_level_summary: true
  high_level_summary_instructions: >-
    Summarize operational risk, user-impacting behavior changes, and whether the
    change affects destructive operations, Immich configuration, or file parsing.
  poem: false
  review_status: true
  review_details: true
  auto_review:
    enabled: true
    drafts: false
  path_filters:
    - "**/*.sh"
    - "**/*.py"
    - "**/*.yml"
    - "**/*.yaml"
    - "**/*.md"
    - "Dockerfile"
    - "docker-compose*.yml"
    - "!.git/**"
    - "!**/.env"
    - "!**/*.log"
    - "!**/raw_takeout_zips/**"
    - "!**/raw_gdrive/**"
    - "!**/takeout_extracted/**"
    - "!**/cleaning_staging/**"
    - "!**/immich_library/**"
    - "!**/media_trash/**"
  path_instructions:
    - path: "scripts/06_delete_duplicates.sh"
      instructions: >-
        Review this file as high-risk. It must default to dry-run, must never delete
        permanently, must only move files into media_trash, and must parse only real
        absolute quoted Czkawka paths. Reject changes that can treat report headers,
        dimensions, sizes, or unquoted text as file paths.
    - path: "scripts/**/*.sh"
      instructions: >-
        Shell scripts must use set -euo pipefail, quote variable expansions, support
        paths with spaces/non-English characters, and avoid destructive commands unless
        there is an explicit confirmation gate.
    - path: "scripts/**/*.py"
      instructions: >-
        Python code must continue on corrupt individual media files where safe, log
        warnings clearly, avoid loading huge media files into memory, and preserve
        metadata behavior.
    - path: "immich/**"
      instructions: >-
        Immich upload storage (/data) must stay separate from the external media
        library (/library). The external library should be mounted read-only unless a
        documented user choice says otherwise.
    - path: "docs/**"
      instructions: >-
        Documentation must include verification commands, dry-run warnings, restore
        instructions, and clear disclaimers before destructive operations.
  tools:
    github-checks:
      enabled: true
      timeout_ms: 900000
    markdownlint:
      enabled: true
    actionlint:
      enabled: true
    shellcheck:
      enabled: true
    yamllint:
      enabled: true
    ruff:
      enabled: true

chat:
  auto_reply: true

knowledge_base:
  code_guidelines:
    enabled: true
    filePatterns:
      - "README.md"
      - "INSTRUCTIONS.md"
      - "docs/**/*.md"
      - ".github/copilot-instructions.md"
