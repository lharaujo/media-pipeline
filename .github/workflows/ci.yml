name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shell:
    name: Shell lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install shell tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck shfmt

      - name: Run ShellCheck
        run: shellcheck -x -e SC1091 scripts/*.sh config/*.sh

      - name: Check shell formatting
        run: shfmt -d scripts/*.sh config/*.sh

  python:
    name: Python lint and syntax
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python tooling
        run: python -m pip install --upgrade pip ruff

      - name: Compile Python files
        run: python -m compileall scripts config

      - name: Run Ruff
        run: ruff check scripts config

      - name: Run Bash and Python unit tests
        run: python -m unittest discover -s tests

  yaml-and-compose:
    name: YAML and Docker Compose validation
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install YAML tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y yamllint

      - name: Run yamllint
        run: yamllint .

      - name: Validate Immich Compose file
        run: |
          cp immich/env.template immich/.env
          docker compose --env-file immich/.env -f immich/docker-compose.yml config >/tmp/immich-compose.rendered.yml
          test -s /tmp/immich-compose.rendered.yml

  github-actions:
    name: GitHub Actions lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run actionlint
        uses: rhysd/actionlint@v1.7.7
